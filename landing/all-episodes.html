<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cinde Executive Brief Archive</title>
    <link rel="stylesheet" href="/landing/styles.css" />
  </head>
  <body data-page="archive">
    <main class="page">
      <section class="hero">
        <div class="hero-top">
          <div class="brand-lockup">
            <img
              data-logo
              src="https://cdn.jsdelivr.net/gh/razzo007/CindePublic@main/albertsons.png"
              alt="Albertsons logo"
            />
            <div class="logo-fallback" data-logo-fallback>Albertsons logo</div>
          </div>
          <div class="hero-copy">
            <h1 class="hero-title" data-brief-title>CINDE Executive Brief</h1>
            <p class="hero-company" data-company-name>Albertsons</p>
            <p class="hero-description">
              Browse the latest executive brief episodes and open the hosted player for any update.
            </p>
          </div>
        </div>

        <div class="hero-actions">
          <a class="button primary" data-home-link href="/landing/index.html">Back to Latest Episode</a>
        </div>
      </section>

      <div class="section-header">
        <h2>All Episodes</h2>
      </div>

      <section class="archive-grid" data-episodes-list></section>
    </main>

    <script src="/landing/config.js"></script>
    <script src="/landing/app.js"></script>
  </body>
</html>
